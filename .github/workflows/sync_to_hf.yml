name: Sync to Hugging Face

on:
  push:
    branches: [main] # Change this to 'master' if your default branch is called master

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to Hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git push --force https://VaishnaviKadwad:$HF_TOKEN@huggingface.co/spaces/VaishnaviKadwad/to-do-list-app main
